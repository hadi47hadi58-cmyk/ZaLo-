<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZaLo AI - المنيعة</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <header class="p-6 bg-white shadow-sm flex justify-between items-center">
        <h1 class="text-2xl font-black text-blue-600">ZaLo AI</h1>
        <div class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold">المنيعة 🇩🇿</div>
    </header>

    <main class="max-w-md mx-auto mt-10 p-6 bg-white rounded-2xl shadow-xl border border-gray-100">
        <h2 class="text-xl font-bold mb-2 text-center">حول صورك إلى احترافية</h2>
        <p class="text-gray-500 text-sm text-center mb-8">ارفع صورة المنتج ودع الذكاء الاصطناعي يتولى الباقي</p>
        
        <div class="border-2 border-dashed border-blue-200 bg-blue-50 rounded-xl p-12 text-center transition-all hover:border-blue-400">
            <div class="text-4xl mb-4">📸</div>
            <p class="text-blue-600 font-medium">اضغط هنا لرفع صورة المنتج</p>
            <input type="file" class="hidden" id="fileUpload">
        </div>

        <button class="w-full mt-8 bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700">
            بدء التحسين الآن
        </button>
    </main>
</body>
</html>
